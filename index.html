<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MAITRI | Multi-Directional Corridor Analytics</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.4/dist/chart.umd.min.js"></script>
<style>
  :root{
    --graphite: #23272E;
    --graphite-soft: #4A515C;
    --steel: #6398D2;
    --steel-dark: #3F6C9E;
    --steel-pale: #DCE8F5;
    --off-white: #F4F6F8;
    --white: #FFFFFF;
    --line: #E1E6EB;
    --radius: 12px;
    --transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
    --shadow: 0 4px 12px rgba(35, 39, 46, 0.03);
    --shadow-hover: 0 8px 24px rgba(35, 39, 46, 0.08);
  }
  *{box-sizing: border-box;}
  body{
    margin: 0; 
    background: var(--off-white); 
    color: var(--graphite);
    font-family: 'Inter', sans-serif; 
    -webkit-font-smoothing: antialiased;
  }
  .wrap{max-width: 1200px; margin: 0 auto; padding: 48px 32px 96px;}

  .status-pill .dot{ transition: background 0.35s ease, box-shadow 0.35s ease; }

  .page-head{
    display: flex; justify-content: space-between; align-items: flex-end; gap: 24px;
    border-bottom: 1px solid var(--line); padding-bottom: 24px; margin-bottom: 32px; flex-wrap: wrap;
  }
  .eyebrow{
    font-family: 'JetBrains Mono', monospace; font-size: 12px; letter-spacing: 0.14em;
    text-transform: uppercase; color: var(--steel-dark); margin: 0 0 8px;
  }
  .page-head h1{font-family: 'Space Grotesk', sans-serif; font-size: 32px; font-weight: 600; margin: 0; letter-spacing: -0.01em;}
  .page-head p{margin: 8px 0 0; color: var(--graphite-soft); font-size: 14.5px; max-width: 540px;}

  .status-pill{
    display: flex; align-items: center; gap: 8px; background: var(--white);
    border: 1px solid var(--line); border-radius: 100px; padding: 8px 16px;
    font-size: 12.5px; font-weight: 600; color: var(--graphite-soft); white-space: nowrap; box-shadow: var(--shadow);
  }
  .dot{width: 7px; height: 7px; border-radius: 50%; background: #B7BEC7;}
  .dot.live{background: #3FA66B; box-shadow: 0 0 0 3px rgba(63, 166, 107, 0.18);}

  .panel{
    background: var(--white); border: 1px solid var(--line); border-radius: var(--radius);
    padding: 28px; margin-bottom: 24px; box-shadow: var(--shadow); transition: var(--transition);
  }
  .panel:hover{box-shadow: var(--shadow-hover);}
  .panel-title{font-family: 'Space Grotesk', sans-serif; font-size: 16px; font-weight: 600; margin: 0 0 4px;}
  .panel-sub{font-size: 13px; color: var(--graphite-soft); margin: 0 0 24px;}

  /* 4-Column Proportional Layout Grid */
  .dropdown-grid{
    display: grid; 
    grid-template-columns: repeat(4, 1fr); 
    gap: 16px;
  }
  
  .custom-dropdown{position: relative; width: 100%;}
  .drop-btn{
    width: 100%; font-family: 'Inter', sans-serif; font-size: 13.5px; font-weight: 600;
    background: var(--white); color: var(--graphite-soft); border: 1px solid var(--line);
    padding: 12px 16px; border-radius: 8px; cursor: pointer; display: flex;
    justify-content: space-between; align-items: center; user-select: none; transition: var(--transition);
  }
  .drop-btn:hover{border-color: var(--steel); color: var(--graphite); background: var(--off-white);}
  .drop-btn::after{
    content: ''; border: solid var(--graphite-soft); border-width: 0 2px 2px 0;
    display: inline-block; padding: 3px; transform: rotate(45deg); transition: transform 0.2s;
  }
  .custom-dropdown.open .drop-btn::after{transform: rotate(-135deg); border-color: var(--steel-dark);}
  .custom-dropdown.open .drop-btn{border-color: var(--steel); background: var(--white); box-shadow: 0 0 0 3px rgba(99,152,210,0.1);}
  
  .drop-content{
    display: block; visibility: hidden; opacity: 0; transform: translateY(10px);
    position: absolute; top: calc(100% + 6px); left: 0; right: 0;
    background: var(--white); border: 1px solid var(--line); border-radius: 8px;
    box-shadow: 0 12px 32px rgba(35,39,46,0.12); z-index: 30; max-height: 280px;
    overflow-y: auto; padding: 8px; transition: opacity 0.15s, transform 0.15s, visibility 0.15s;
  }
  .custom-dropdown.open .drop-content{visibility: visible; opacity: 1; transform: translateY(0);}
  
  .drop-item{
    display: flex; align-items: center; justify-content: space-between;
    padding: 8px 12px; border-radius: 6px; cursor: pointer; font-size: 13px;
    font-weight: 500; user-select: none; transition: var(--transition);
  }
  .drop-item:hover{background: var(--off-white); color: var(--graphite);}
  .drop-item .left-side{display: flex; align-items: center; gap: 10px;}
  .drop-item input{accent-color: var(--steel); width: 15px; height: 15px; cursor: pointer;}
  
  .drop-item.select-all-item {
    border-bottom: 1px dashed var(--line); margin-bottom: 6px; padding-bottom: 10px; font-weight: 600; color: var(--steel-dark);
  }

  .badge-count{
    font-family: 'JetBrains Mono', monospace; font-size: 11px; color: var(--graphite-soft);
    background: var(--line); padding: 2px 6px; border-radius: 4px; font-weight: 500;
  }
  .drop-item:hover .badge-count{background: var(--steel-pale); color: var(--steel-dark);}

  .chart-scroll{overflow-x: auto; overflow-y: hidden; padding-bottom: 4px; margin-top: 10px;}
  .chart-box{position: relative; height: 380px;}

  @media (max-width: 1024px) {
    .dropdown-grid { grid-template-columns: repeat(2, 1fr); }
  }
  @media (max-width: 640px) {
    .page-head{flex-direction: column; align-items: flex-start; gap: 16px;}
    .dropdown-grid { grid-template-columns: 1fr; }
    .wrap{padding: 32px 16px 72px;}
  }
  .modal{display:none;position:fixed;inset:0;z-index:9999;background:rgba(0,0,0,.45);}
.modal-content{background:#fff;width:90%;max-width:1200px;margin:40px auto;padding:20px;border-radius:12px;max-height:80vh;overflow:auto;}
.close-btn{float:right;cursor:pointer;font-size:28px;font-weight:bold;}
.detail-table{width:100%;border-collapse:collapse;}
.detail-table th,.detail-table td{border:1px solid #E1E6EB;padding:8px;}
</style>
</head>
<body>

<div class="wrap">

  <div class="page-head">
    <div>
      <p class="eyebrow">MAITRI &middot; Virtual Trade Corridor</p>
      <h1>Live Corridor Data</h1>
    </div>
  </div>

  <div class="panel">
    <p class="panel-title">Corridor Control Parameter Filters</p>

    <div class="dropdown-grid">
      <div class="custom-dropdown" id="yearDropdownContainer">
        <button class="drop-btn" onclick="toggleDropdown('yearDropdownContainer')"><span>Years</span> <b id="yearDropCount">All</b></button>
        <div class="drop-content" id="yearDropContent"></div>
      </div>
      <div class="custom-dropdown" id="monthDropdownContainer">
        <button class="drop-btn" onclick="toggleDropdown('monthDropdownContainer')"><span>Months</span> <b id="monthDropCount">All</b></button>
        <div class="drop-content" id="monthDropContent"></div>
      </div>

      <div class="custom-dropdown" id="originPortDropdownContainer">
        <button class="drop-btn" onclick="toggleDropdown('originPortDropdownContainer')"><span>Origin Port</span> <b id="originPortDropCount">All</b></button>
        <div class="drop-content" id="originPortDropContent"></div>
      </div>
      <div class="custom-dropdown" id="originSysDropdownContainer">
        <button class="drop-btn" onclick="toggleDropdown('originSysDropdownContainer')"><span>Origin System</span> <b id="originSysDropCount">All</b></button>
        <div class="drop-content" id="originSysDropContent"></div>
      </div>

      <div class="custom-dropdown" id="destPortDropdownContainer">
        <button class="drop-btn" onclick="toggleDropdown('destPortDropdownContainer')"><span>Destination Port</span> <b id="destPortDropCount">All</b></button>
        <div class="drop-content" id="destPortDropContent"></div>
      </div>
      <div class="custom-dropdown" id="destSysDropdownContainer">
        <button class="drop-btn" onclick="toggleDropdown('destSysDropdownContainer')"><span>Destination System</span> <b id="destSysDropCount">All</b></button>
        <div class="drop-content" id="destSysDropContent"></div>
      </div>

      <div class="custom-dropdown" id="typeDropdownContainer">
        <button class="drop-btn" onclick="toggleDropdown('typeDropdownContainer')"><span>Message Types</span> <b id="typeDropCount">All</b></button>
        <div class="drop-content" id="typeDropContent"></div>
      </div>
    </div>
  </div>

  <div class="panel">
    <p class="panel-title">Message Volume Breakdown Graph</p>
    <p class="panel-sub" id="graphCounterSub">0 entries matched</p>
    <div class="chart-scroll">
      <div class="chart-box" id="globalChartBox">
        <canvas id="globalChart"></canvas>
      </div>
    </div>
  </div>

</div>
<div id="detailModal" class="modal">
<div class="modal-content">
<span class="close-btn" onclick="closeModal()">&times;</span>
<h3 id="detailTitle">Message Details</h3>
<div id="detailContent"></div>
</div>
</div>
<script>
/* ============================================================
   EMBEDDED CORRIDOR DATASET (mirrors dataset.json)
   Kept inline so the dashboard works even when opened directly
   from a zip file (double-click / file:// — fetch() is blocked
   there by the browser). If dataset.json IS reachable (served
   over http/https, e.g. Netlify or Live Server), it is fetched
   and takes priority automatically below.
   ============================================================ */
let masterRecords = [];

const MONTH_ORDER = ["January","February","March","April","May","June","July","August","September","October","November","December"];

/* ============================================================
   FILTER MANAGEMENT & SELECTION STATES
   ============================================================ */
let sel = { years: new Set(), months: new Set(), types: new Set(), originPorts: new Set(), destPorts: new Set(), originSystems: new Set(), destSystems: new Set() };
let globalChartInstance = null;


/* ============================================================
   MASTER FILTER VALUES (Always Visible)
   ============================================================ */
const MASTER_PORTS = [
  'JNPA',
  'Kandla',
  'Khalifa',
  'Jebel Ali',
  'Port Fujairah',
];

const MASTER_SYSTEMS = [
  'NLP-M',
  'CCS',
  'KICT',
  'BMCT',
  'NSFT',
  'AD Ports',
  'Dubai Trade',
  'ICEGATE'
];

const MASTER_MESSAGE_TYPES = [
  'BAPLIE',
  'CODECO',
  'COARRI',
  'VESPRO',
  'VESDEP',
  'ETAETD',
];


function toggleDropdown(id) {
  const el = document.getElementById(id);
  const isOpen = el.classList.contains('open');
  document.querySelectorAll('.custom-dropdown').forEach(d => d.classList.remove('open'));
  if (!isOpen) el.classList.add('open');
}

document.addEventListener('click', (e) => {
  if (!e.target.closest('.custom-dropdown')) {
    document.querySelectorAll('.custom-dropdown').forEach(d => d.classList.remove('open'));
  }
});

/* ============================================================
   INITIALIZATION LAYOUT PIPELINE
   ============================================================ */
function initDashboard() {
  const dYears = Array.from(
    new Set(masterRecords.map(r => r.year))
  ).sort();

  const dMonths = Array.from(
    new Set(masterRecords.map(r => r.month))
  ).sort((a,b)=>MONTH_ORDER.indexOf(a)-MONTH_ORDER.indexOf(b));

  const dTypes = Array.from(
    new Set([
      ...MASTER_MESSAGE_TYPES,
      ...masterRecords.map(r => r.type.toUpperCase())
    ])
  ).sort();

  const dOrigPorts = Array.from(
    new Set([
      ...MASTER_PORTS,
      ...masterRecords.map(r => r.originPort || '-')
    ])
  ).sort();

  const dDestPorts = Array.from(
    new Set([
      ...MASTER_PORTS,
      ...masterRecords.map(r => r.destPort || '-')
    ])
  ).sort();

  const dOrigSys = Array.from(
    new Set([
      ...MASTER_SYSTEMS,
      ...masterRecords.map(r => r.originSys || '-')
    ])
  ).sort();

  const dDestSys = Array.from(
    new Set([
      ...MASTER_SYSTEMS,
      ...masterRecords.map(r => r.destSys || '-')
    ])
  ).sort();

  sel.years = new Set(dYears);
  sel.months = new Set(dMonths);
  sel.types = new Set(dTypes);
  sel.originPorts = new Set(dOrigPorts);
  sel.destPorts = new Set(dDestPorts);
  sel.originSystems = new Set(dOrigSys);
  sel.destSystems = new Set(dDestSys);

  buildDropdownOptions('yearDropContent', dYears, 'years', 'yearDropCount');
  buildDropdownOptions('monthDropContent', dMonths, 'months', 'monthDropCount');
  buildDropdownOptions('typeDropContent', dTypes, 'types', 'typeDropCount');
  buildDropdownOptions('originPortDropContent', dOrigPorts, 'originPorts', 'originPortDropCount');
  buildDropdownOptions('destPortDropContent', dDestPorts, 'destPorts', 'destPortDropCount');
  buildDropdownOptions('originSysDropContent', dOrigSys, 'originSystems', 'originSysDropCount');
  buildDropdownOptions('destSysDropContent', dDestSys, 'destSystems', 'destSysDropCount');

  updateDashboardMetrics();
}

function buildDropdownOptions(containerId, dataset, filterKey, labelId) {
  const container = document.getElementById(containerId);
  container.innerHTML = '';
  
  const selectAllRow = document.createElement('div');
  selectAllRow.className = 'drop-item select-all-item';
  selectAllRow.innerHTML = `
    <div class="left-side">
      <input type="checkbox" class="select-all-cb" checked>
      <span>Select All</span>
    </div>
  `;
  
  const mainCbsSelector = () => container.querySelectorAll('.individual-cb');
  const selectAllCb = selectAllRow.querySelector('.select-all-cb');

  selectAllCb.addEventListener('change', (e) => {
    const isChecked = e.target.checked;
    mainCbsSelector().forEach(cb => cb.checked = isChecked);
    
    if (isChecked) {
      dataset.forEach(val => sel[filterKey].add(val));
    } else {
      sel[filterKey].clear();
    }
    
    updateLabelCount(labelId, filterKey, dataset.length);
    updateDashboardMetrics();
  });

  selectAllRow.addEventListener('click', (e) => {
    if(e.target.tagName !== 'INPUT') {
      selectAllCb.checked = !selectAllCb.checked;
      selectAllCb.dispatchEvent(new Event('change'));
    }
  });
  container.appendChild(selectAllRow);

  dataset.forEach(val => {
    const item = document.createElement('div');
    item.className = 'drop-item';
    const safelyEscapedId = val.toString().replace(/\s+/g, '_').replace(/[^a-zA-Z0-9_]/g, '');
    item.innerHTML = `
      <div class="left-side">
        <input type="checkbox" class="individual-cb" data-val="${val}" checked>
        <span>${val}</span>
      </div>
      <span class="badge-count" id="badge-${filterKey}-${safelyEscapedId}">0</span>
    `;
    
    const individualCb = item.querySelector('.individual-cb');
    individualCb.addEventListener('change', (e) => {
      if (e.target.checked) sel[filterKey].add(val);
      else sel[filterKey].delete(val);
      
      if (sel[filterKey].size === dataset.length) {
        selectAllCb.checked = true;
        selectAllCb.indeterminate = false;
      } else if (sel[filterKey].size === 0) {
        selectAllCb.checked = false;
        selectAllCb.indeterminate = false;
      } else {
        selectAllCb.checked = false;
        selectAllCb.indeterminate = true;
      }

      updateLabelCount(labelId, filterKey, dataset.length);
      updateDashboardMetrics();
    });
    
    item.addEventListener('click', (e) => {
      if(e.target.tagName !== 'INPUT') {
        individualCb.checked = !individualCb.checked;
        individualCb.dispatchEvent(new Event('change'));
      }
    });
    container.appendChild(item);
  });
}

function updateLabelCount(labelId, filterKey, totalLen) {
  const countLabel = document.getElementById(labelId);
  if (sel[filterKey].size === totalLen) countLabel.textContent = 'All';
  else if (sel[filterKey].size === 0) countLabel.textContent = 'None';
  else countLabel.textContent = sel[filterKey].size;
}

/* ============================================================
   CORE MATHEMATICAL METRICS GRAPH PARSING (CLUSTERED BAR LOGIC)
   ============================================================ */
function updateDashboardMetrics() {
  const filtered = masterRecords.filter(r => {
    return sel.years.has(r.year) &&
           sel.months.has(r.month) &&
           sel.types.has(r.type.toUpperCase()) &&
           sel.originPorts.has(r.originPort || '-') &&
           sel.destPorts.has(r.destPort || '-') &&
           sel.originSystems.has(r.originSys || '-') &&
           sel.destSystems.has(r.destSys || '-');
  });
  currentFilteredRecords = filtered;
  document.getElementById('graphCounterSub').textContent = `${filtered.length} logs successfully evaluated within selected filter scope.`;

  updateBadgeCounts(filtered);

  // Compile active distinct categories
  const distinctTypes = Array.from(new Set(masterRecords.map(r => r.type.toUpperCase()))).sort();
  
  const receivedCounts = {};
  const transmittedCounts = {};
  
  distinctTypes.forEach(t => {
    receivedCounts[t] = 0;
    transmittedCounts[t] = 0;
  });

  filtered.forEach(r => {
    const t = r.type.toUpperCase();
    const statusNorm = String(r.status || '').trim().toLowerCase();
    
    if (statusNorm === 'transmitted') {
      transmittedCounts[t]++;
    } else {
      // Default / Standard acts as Received
      receivedCounts[t]++;
    }
  });

  drawClusteredChart(distinctTypes, receivedCounts, transmittedCounts);
}

function updateBadgeCounts(filteredItems) {
  const counts = { years:{}, months:{}, types:{}, originPorts:{}, destPorts:{}, originSystems:{}, destSystems:{} };
  
  filteredItems.forEach(r => {
    counts.years[r.year] = (counts.years[r.year]||0) + 1;
    counts.months[r.month] = (counts.months[r.month]||0) + 1;
    counts.types[r.type.toUpperCase()] = (counts.types[r.type.toUpperCase()]||0) + 1;
    counts.originPorts[r.originPort || '-'] = (counts.originPorts[r.originPort || '-']||0) + 1;
    counts.destPorts[r.destPort || '-'] = (counts.destPorts[r.destPort || '-']||0) + 1;
    counts.originSystems[r.originSys || '-'] = (counts.originSystems[r.originSys || '-']||0) + 1;
    counts.destSystems[r.destSys || '-'] = (counts.destSystems[r.destSys || '-']||0) + 1;
  });

  const syncLoop = (key) => {
    sel[key].forEach(val => {
      const safelyEscapedId = val.toString().replace(/\s+/g, '_').replace(/[^a-zA-Z0-9_]/g, '');
      const el = document.getElementById(`badge-${key}-${safelyEscapedId}`);
      if(el) el.textContent = counts[key][val] || 0;
    });
  };

  syncLoop('years'); syncLoop('months'); syncLoop('types');
  syncLoop('originPorts'); syncLoop('destPorts');
  syncLoop('originSystems'); syncLoop('destSystems');
}

function drawClusteredChart(labels, receivedMap, transmittedMap) {
  if (typeof Chart === 'undefined') return;
  
  const receivedData = labels.map(l => receivedMap[l] || 0);
  const transmittedData = labels.map(l => transmittedMap[l] || 0);

  document.getElementById('globalChartBox').innerHTML = '<canvas id="globalChart"></canvas>';
  const ctx = document.getElementById('globalChart').getContext('2d');
  
  if (globalChartInstance) globalChartInstance.destroy();
  globalChartInstance = new Chart(ctx, {
    type: 'bar',
    data: {
      labels: labels,
      datasets: [
        {
          label: 'Received',
          data: receivedData,
          backgroundColor: '#6398D2', // Steel Blue
          borderRadius: 4,
          barPercentage: 0.8,
          categoryPercentage: 0.7
        },
        {
          label: 'Transmitted',
          data: transmittedData,
          backgroundColor: '#3FA66B', // Clean Green
          borderRadius: 4,
          barPercentage: 0.8,
          categoryPercentage: 0.7
        }
      ]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      animation: { duration: 300, easing: 'easeOutQuart' },
	  onClick: function(event, elements){
if(!elements.length) return;
const el = elements[0];
showDetails(this.data.labels[el.index], this.data.datasets[el.datasetIndex].label);
},
      plugins: {
        legend: { 
          display: true, 
          position: 'top',
          labels: { font: { family: 'Inter', size: 12, weight: 600 }, color: '#23272E' }
        },
        tooltip: { backgroundColor: '#23272E', padding: 12, bodyFont: { family: 'Inter' } }
      },
      scales: {
        x: { ticks: { color: '#23272E', font: { weight: 700, family: 'Inter' } }, grid: { display: false } },
        y: { beginAtZero: true, ticks: { precision: 0, color: '#4A515C', font: { family: 'JetBrains Mono' } }, grid: { color: '#E1E6EB' } }
      }
    }
  });
}

/* ============================================================
   AUTOMATED BULK SPREADSHEET INDICES PARSER
   ============================================================ */
function normHeader(h){ return String(h||'').trim().toLowerCase().replace(/[\s_]+/g, ''); }

function convertExcelToJSON(rows) {
  return rows.map(row => {
    const norm = {};
    Object.keys(row).forEach(k => norm[normHeader(k)] = row[k]);

    let year = "2026", month = "July";
    if(norm['date']){
      const d = new Date(norm['date']);
      if(!isNaN(d)){ year = String(d.getFullYear()); month = d.toLocaleString('en-US',{month:'long'}); }
    }
    if(norm['year']) year = String(norm['year']);
    if(norm['month']) month = String(norm['month']);

    // Capture precise Transmitted / Received metrics flags
    let rawStatus = String(norm['status'] || 'Received').trim();
    let finalStatus = "Received";
    if (rawStatus.toLowerCase() === 'transmitted' || rawStatus.toLowerCase() === 'transmit') {
      finalStatus = "Transmitted";
    }

    return {
      year: year,
      month: month,
      type: (norm['messagetype'] || norm['type'] || 'OTHER').toString().toUpperCase(),
      originPort: norm['originport'] || norm['port'] || '-',
      destPort: norm['destinationport'] || '-',
      originSys: norm['originsystem'] || '-',
      destSys: norm['destinationsystem'] || '-',
      status: finalStatus
    };
  });
}

function convertJSONRecords(rows) {
  return rows.map(row => {
    const norm = {};
    Object.keys(row).forEach(k => norm[normHeader(k)] = row[k]);

    let rawStatus = String(norm['status'] || 'Received').trim();
    let finalStatus = (rawStatus.toLowerCase() === 'transmitted' || rawStatus.toLowerCase() === 'transmit')
      ? 'Transmitted' : 'Received';

    return {
      year: String(norm['year'] || '2026'),
      month: String(norm['month'] || 'July'),
      type: (norm['messagetype'] || norm['type'] || 'OTHER').toString().toUpperCase(),
      originPort: norm['originport'] || norm['port'] || '-',
      destPort: norm['destinationport'] || norm['destport'] || '-',
      originSys: norm['originsystem'] || norm['originsys'] || '-',
      destSys: norm['destinationsystem'] || norm['destsys'] || '-',
      status: finalStatus
    };
  });
}

function activateData(rows) {
  const formatted = convertJSONRecords(rows);
  if (formatted.length > 0) masterRecords = formatted;

  const dot = document.getElementById('statusDot');
  const txt = document.getElementById('statusText');
  if (dot) dot.className = 'dot live';
  if (txt) txt.textContent = 'Real data active';

  initDashboard();
  document.querySelector('.wrap').classList.add('data-ready');
}
function showDetails(messageType,statusLabel){
 const rows=currentFilteredRecords.filter(r=>
 r.type.toUpperCase()===messageType &&
 r.status.toLowerCase()===statusLabel.toLowerCase()
 );
 let html=`<table class="detail-table"><thead><tr><th>Origin Port</th><th>Destination Port</th><th>Origin System</th><th>Destination System</th><th>Status</th></tr></thead><tbody>`;
 rows.forEach(r=>{
 html+=`<tr><td>${r.originPort||'-'}</td><td>${r.destPort||'-'}</td><td>${r.originSys||'-'}</td><td>${r.destSys||'-'}</td><td>${r.status||'-'}</td></tr>`;
 });
 html+='</tbody></table>';
 document.getElementById('detailTitle').innerHTML=`${messageType} - ${statusLabel} (${rows.length})`;
 document.getElementById('detailContent').innerHTML=html;
 document.getElementById('detailModal').style.display='block';
}
function closeModal(){
 document.getElementById('detailModal').style.display='none';
}
fetch('dataset.json')
  .then(res => { if(!res.ok) throw new Error(); return res.json(); })
  .then(rows => activateData(rows))
  .catch(()=> activateData([]));
</script>
</body>
</html>
